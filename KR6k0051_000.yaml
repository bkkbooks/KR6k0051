front:
  text: 式義摩那尼戒本序惟夫世教禮儀為先出世洪規戒律居首非禮儀無以成賢智乘戒律所以趣菩提故大經云戒是一切道果梯航亦是一切善果根本若不護持禁戒云何當見佛性一切衆生雖有佛性要因持戒然後乃見因見佛性得成無上菩提是故大小兩乘同稟尸羅出家五衆共遵戒法第以時當末法人多喜受撥持虗霑戒品反作苦海中敝囊或以狂慧妄談般若輕毀毗尼致使愚蒙隨習後進無門寧知如來備盡物機教闡三乘戒立五衆而女性暗鈍煩惑偏厚乃制以六法令其二年預學大尼一切諸戒威儀戒體漸成方聽受具然其所依必以知律大尼為師但大尼不得向説五篇七聚之名惟聽語令不淫不盜等諸戒威儀嗟夫末代大尼罕遘知律者全稀既不蒙於親授復不許閲篇聚之文無由得知止持作犯縱有向上之志而無措足之方爰是稽諸律本編集所應學法俾有慚有愧樂學戒者時而習之時順治庚寅孟夏大菩提心沙門弘贊識式叉摩那尼戒本目次初學四根本二學六法三學二百九十二行法式叉摩那尼戒本目次終

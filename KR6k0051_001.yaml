body:
  text: 廣州南海寶象林沙門弘贊在犙輯梵語式叉摩那尼此云學法女謂於二年中具學三法一學根本謂四重也二學六法謂羯磨所得者三學行法謂大比丘尼一切諸戒威儀也今依律本詳列三法以便受戒者習學初學根本共有四事一不得作不淨行行婬欲法若式叉摩那行婬欲法乃至共畜生非式叉摩那非釋種女是犯重罪故二不得偷盜乃至草葉若式叉摩那偷人五錢若過五錢若自取教人取若自斷教人斷若自破教人破若燒若埋若壞色者非式叉摩那非釋種女是犯重罪故斷謂斫作兩斷破謂毀裂燒埋壞皆是使錢色相變壞也五錢者是五大錢一大錢直十六小錢若取五錢直五錢物悉犯重罪三不得故斷眾生命乃至蟻子若式叉摩那故自手斷人命若持刀授與人教死讚死若與人非藥若墮人胎禱呪術自作教人作者非式叉摩那非釋種女是犯重罪故讚謂讚歎令死非藥謂毒藥或彼人病與不相宜藥令死音掩謂祈禱鬼神也咒謂用惡咒術也四不得妄語乃至戲笑若式叉摩那不真實非己有自稱言得上人法得禪得解脫三昧正受得須陀洹果乃至阿羅漢果天來龍來鬼神來供養我即非式叉摩那非釋種女是犯重罪故解脫謂八解脫三昧此云正定正受亦定之異名須陀洹此云入流謂入聖人之流阿羅漢此云無著亦云無生謂解脫三界生死故也此四重戒隨犯其一即應滅擯後不得受比丘尼戒亦不得還為式叉摩那沙彌尼優婆夷也若更從師強受亦不得戒仍獲重罪受他信施悉名犯盜二學六法正有六事若式叉摩那與染污心男子共身相摩觸犯戒應更受戒染污心者婬欲意也若式叉摩那盜心取減五錢犯戒應更受戒減五錢者或一錢二錢三錢四錢若式叉摩那斷畜生不能變化者命犯戒應更受戒不能變化者謂畜生不能變作人天龍鬼神等形畜生者乃至微細昆蟲盡名畜生若式叉摩那於眾中故作妄語犯戒應更受戒此中妄語謂小妄語也若式叉摩那非時食犯戒應更受戒日中後至明旦天未明即名為非時若式叉摩那飲酒犯戒應更受戒此之六法若犯其一即名缺戒應更與二歲羯磨復從始學若學不滿二歲不得受大戒三學行法共二百九十二法佛言式叉摩那一切大尼戒應學除自取食授食與他準僧祇律制自從沙彌尼受食不得以染污心受染污心男子捉手捉衣入屏處共立共語共行身相倚若共期屏處者謂人所不見聞處不得覆藏他罪若知他有罪不自舉不白僧不語眾人後於異時彼人或命終或滅擯或罷道等乃作是言我先知彼有如是如是事是覆藏他重罪故若知比丘乃至守園人及沙彌為僧所舉如法如律如佛所教不隨順不懺悔僧未與作法共住而隨從之他比丘尼式叉摩那諫時應捨不得不捨隨順者謂隨順其言或授經及與衣食不得作媒嫁持男意語女持女意語男或為成婦事或為私通事乃至須臾間不得瞋恚不喜以無根重罪謗他欲壞彼清淨行者無根者謂不見不聞不疑彼犯而故作謗語不得瞋恚不喜於異分事中取片以無根法謗他欲壞彼人梵行異分者是重罪也取片者謂於重罪中取小罪以謗他犯重也不得詣官語居士或居士兒或奴或客作人乃至須臾頃詣官者謂以事而告知官也若為人輕陵應語其父母或其親族或比丘比丘尼近事男近事女而訶諫之客作人者謂受雇使作之人若先知是賊女罪應死人所知不問王若大臣若種性不得便度出家學法女雖無畜徒法然應預學之不得獨渡水獨入村獨宿獨在後行獨宿者謂於村中俗家獨宿也若知男子有染污心不得從彼受食及餘物十一不得教他從染污心男子受食及物不得破和合僧諫而不捨不得作破僧伴黨諫而不捨若依城邑村落住污他家行惡行眾僧驅擯不得不服污他家者謂以物贈遺白衣行惡行者謂種諸花果溉灌採實乃至與人或與童子共牀坐同器食歌舞鼓吹受雇戲笑等若惡性不受人語他諫時應捨不得彼此相親近住共作惡行惡聲流布展轉共相覆藏過失諫而不捨親近者數共戲笑數共相調若眾僧為他作別住訶諫時不得教彼言汝等莫別住當共住我亦見餘有不別住共作惡行惡聲流布共相覆罪而僧以恚故教汝別住是謗僧故諫時應捨不得輙以一小事瞋恚不喜便作是言我捨佛捨法捨僧不獨有此沙門釋子亦更有餘沙門婆羅門修梵行者我等亦可於彼修梵行若僧諫時應捨不得喜鬬諍不善憶持諍事僧共評斷便言僧有愛恚怖癡諫而不捨不得畜長衣過十日不淨施淨施有二一真實淨施謂真實施與他人二展轉施施謂對他作法已而自畜持二十不得離衣異處宿乃至經一夜不得從非親里居士居士婦乞衣若奪衣失衣燒衣漂衣時聽乞若奪衣失衣燒衣漂衣而居士居士婦自恣請多施與衣當知足受不得過若居士居士婦為辦衣價欲買衣施先未受自恣請不得為好故便到其家讚譽索衣若二居士居士婦為辦衣價欲買衣施與先未受自恣請不得為好故便到二居士家稱譽勸令共作一衣未受自恣請者謂未任其往索也若檀越遣使送衣價與式叉摩那而式叉摩那由不得捉持是價故不受彼使便以衣價付執事人而去若式叉摩那須衣時應二三反往執事人所語言我須衣若不得衣者四五六反在彼執事人前默然住得衣者善不得過是更往求衣當語檀越知取還衣價莫使失自不得受不得自手取金銀錢若教人取若口可受口可者謂口應諾而受也不得作種種販賣若畜鉢減五綴不漏不得為好故更求新鉢不得自求縷使非親里織師織作衣縷謂縷線三十若檀越使織師為式叉摩那織作衣先未受請不得為好故便往織師所語令廣長堅緻齊整織更增與價乃至一食直若施與他衣已後不得瞋恚故自奪取教人奪取若為病故畜酥油生酥蜜石蜜得齊七日內殘宿而食不得過七日服酥謂牛羊等乳變成者油謂蔓青芝麻等油蜜謂蜂蜜石蜜即蔗糖煎煉成者此等諸藥從他人受得時即為初日齊七日內應自取服若有餘當施與人不得留至第八日若十日未滿夏三月有人為急因緣故以衣施與應受受已乃至衣時應畜不得過轉僧七日十六日受功德衣至十二月十五日捨此五月中名衣時若不受功德衣一月名時謂七月十六日至八月十五日也式叉摩那雖無功德衣以其坐夏有功故準理亦應隨僧得兩時利益畜長衣而不犯戒若過兩時不作淨施即犯凡一切衣物要至安居竟得畜以此是急施衣故乃開前十日也急因緣者或他為遠行征伐故施或為病人故施或為產難等故施若知物施僧不得迴以入己不得欲索是更索彼者謂往施家求此物已更求餘物也若知檀越所為僧施異不得迴作餘用謂檀越與財物作堂而迴用作衣服或與作衣服而迴作堂或與此處乃迴與彼處用若問主即隨主語用若主與物時言隨意用得用若所為施物異自求為僧不得迴作餘用所為施異者若為食施而用作衣為衣施而用作食若為餘處乃更為餘處用自求者處處求乞也若檀越所施物異不得迴作餘用若他施物與作舍而以此物貿作衣不犯如前前為僧作堂此為一二人作舍或為自也若檀越所為施物異自求為僧不得迴作餘用眾為作房舍故處處求得財物而以財物貿作衣共分四十不得畜長鉢即日得鉢即日應受持一鉢有餘者當淨施若遣與人不得多畜好色器若即日得器應即日受可須用者十六枚餘者當淨施若遣與人十六枚者謂大釜釜葢大甕及杓小釜釜葢小甕及杓水瓶瓶葢甕及杓洗瓶瓶葢壅及杓若許他病衣後時應與病衣者月水出時遮內身上及著裙也若許他餘所須物亦應與之不得以非時衣受作時衣時者不受功德衣一月受功德衣五月名時非時者除此二時中於餘時得長衣是名非時衣也時衣安居僧應分非時衣現前僧應分若與他貿易衣已後時不得瞋恚還奪取或使人奪取貿易衣者或以衣貿衣或以餘物貿衣或以衣貿餘物若乞重衣當齊價直四張㲲不得過重衣者寒時衣也若乞輕衣極至價直兩張半㲲不得過輕衣者熱時衣不得故妄語六法中謂於眾中故作妄語此中乃至向一人說者便犯不得毀呰語謂毀辱於他令彼羞耻也不得兩舌語謂傳他彼此之言令生鬬亂也五十不得與男子同室宿不得共未受戒女人同一室宿過三夜僧祗律云大尼得與式叉摩那三宿式叉摩那得與沙彌尼三宿不得與未受戒人共誦法準本律不聽與未受大戒人共誦經法餘律不聽向未具人說大戒法令此式叉戒亦不聽向沙彌尼及在家人說若知他有麤惡罪不得向未受大戒人說若僧作羯磨差使說不犯不得向未受大戒人說過人法謂實自證得禪定解脫三昧初果乃至四果不得向未受大戒人說也不得與男子說法過五六語五謂五陰六謂六根六塵或更有五六相應之語若有有智識女人在傍過說不犯不得自手掘地若教人掘不得壞鬼神村一切草木是鬼神所依住猶若人村不得損壞也乃至一切生種亦不得損壞不得妄作異語惱他謂他如法問時情生不悅即妄以餘事答之令彼生惱也不得嫌罵他或面罵或背罵六十若取僧繩牀木牀臥具坐褥露地自敷若教人敷去時當自舉若教人舉若於僧房中取僧臥具自敷教人敷去時當自舉若教人舉若知他先住處後來不得於中間敷臥具止宿欲令彼嫌窄自避去不得瞋他不喜於僧房中自牽出教人牽出不得在重閣上坐臥脫脚繩牀木牀脫脚謂插脚尖脚閣不堅牢墮下傷人若知水有蟲不得自用澆泥若草或教人澆餘一切洗濯等俱名為用若作大房戶扉牕牖及餘裝飾具指授覆苫應齊二三節不得過二三節者謂二三重度也若施一食處無病應受一食不得過其施主為麤故立舍施食而不能多施或限施一食或施一宿不得別眾食若病時作衣時施衣時行路時乘船時大會時沙門施食時皆不犯若無病至檀越家請與食不得過二三鉢受持還寺中不分與餘尼食七十不得殘宿食謂今日受已留至明日食不得不受食及藥著口中除水及楊枝不受無犯若準本部聽式叉摩那自手取食及授食與尼按僧祇律亦聽與大尼授食除火淨生種取金銀錢自從沙彌尼受食若先受請已不得於前食後食行詣餘家而不囑餘尼除病時作衣時施衣時不囑無犯若食家中有寶不得強安坐食家者謂其家夫婦有欲意欲為不淨事不得強坐妨彼也若食家中有寶不得在屏處坐不得獨與男子露地一處共坐若先許他共至聚落與食而竟不教與食便言我與汝一處共坐共語不樂而方便遣他去者得罪若檀越請與四月藥無病亦應受不得過受除常請更請分請盡壽請不犯若一月二月三月隨請而受不得過期限復往取不得往觀軍陣除有請喚因緣不犯若有因緣至軍中二宿三宿不得過若為三寶緣事須往軍中宿一宿得了即應還乃至三宿不得過八十若軍中二宿三宿時不得觀軍鬬戰或觀遊軍象馬勢力不得水中戲不得以指擊攊他謂以指挃其肉令酸癢難忍而取笑也不得不受諫語不得恐怖他若半月洗浴無病應受不得過除熱時病時作時大風時雨時遠行來時不犯若無病不得露地然火炙或教人然除為病語者煮食熏鉢染衣然燈燒香等不犯不得藏他衣鉢坐具針筒或教人藏下至戲笑餘一切物俱不得藏除畏失壞故暫舉即須還若淨施與他衣後不問主不得取著淨施者謂真實施與他也若作展轉淨施法即隨意著不須問主若得新衣當作三種染壞色若青若黑若木蘭若不作者不得著用三種色中隨意用一若得如法色新衣亦應點淨而著乃至囊帶㡌襪巾等皆須點淨九十若知水有蟲不得飲須細濾細觀無蟲方用不得故惱他乃至少時不樂若知他有罪不得覆藏前戒謂覆藏重罪此戒謂覆藏輕罪若知諍事如法懺悔已後不得更發舉若知是賊伴不得共一路行乃至聚落若生惡見作是言我知佛所法行婬欲非是障道法他諫時即應捨若知是不捨惡邪見語人僧未與作解法不得畜同止宿若知是惡見被擯沙彌尼不得畜養共同止宿若他如法諫時不得便言我今不學是戒乃至有智慧持律者當難問之若聞說戒時不得輕訶戒言何用說是雜碎戒為令人惱愧懷疑一百若說戒法時當一心攝耳諦聽若共眾同與他物已後不得言彼隨親厚以僧物與他若眾斷事時不得不與欲而起去若與欲已後不得更悔不得共鬬諍後聽此語而向彼說不得瞋恚故不喜而打他不得瞋恚故不喜以手搏他搏謂長掌向他不得瞋恚故不喜以無根罪謗他前戒以重罪謗此戒以輕罪謗若王未出未藏寶不得入過宮門閾若寶及寶裝飾具不得自捉教人捉除在寺內及寄宿處畏失故當取藏舉之仍須記識以還主一百一十不得非時入聚落而不囑授當囑大尼無尼應囑同梵行者乃至沙彌尼若作繩牀木牀足應高如來八指不得過如來一指濶二寸不得以兜羅綿貯作繩牀木牀臥具坐具兜羅綿者是白楊樹花楊柳花蒲臺花之總名也不得噉葱蒜不得剃三處毛謂大小便處及腋下若以水作淨應齊兩指各一節不得過若內有蟲草挽出不犯不得以胡膠等物作男根不得共相拍以手若脚或女根相拍俱犯若比丘無病食時不得供給水在前立以扇扇不得乞生穀麥乃至大小豆胡麻俱不聽乞除從親里及出家人乞己為他乞他為己乞不乞自得不犯一百二十不得在生草上大小便涕唾若有病不犯若晨日不看牆外不得傾棄大小便當看牆外無人方棄凡棄諸物先應謦欬或彈指不得往觀聽伎樂不得入村內與男子在屏處共立語前戒謂與有婬欲意男子屏處立語此之三戒是與無婬意男子共立語不得與男子共入屏障處不得入村內巷中遣伴遠去在屏處與男子共立耳語若入白衣家內坐不得不語主人便捨去若入白衣家內不得不語主人便輙坐牀上除有常坐處若是親厚家若石上木上埵上草敷上若病不犯若入他家不語主人不得輙自敷坐止宿不得與男子共入闇室中一百三十不得不審諦受語便向人說若有小因緣事不得便呪咀言墮三惡道不生佛法中謂不應咒誓若有難忍事至當云若我有如是事南無佛若汝有如是事亦南無佛不得共鬬諍不善憶持諍事便椎胸啼哭若無病不得二人共牀臥不得共一褥同一被臥若各別敷臥褥若寒時止有一被聽各內著襯身衣臥不得為惱故而在彼前誦經問義教授若因活者病不得不瞻視同活者謂共同利養若安居初聽他在房中安牀後不得瞋恚故驅他出除彼破戒及應滅擯者不犯不得春夏冬一切時人間遊行除為三寶事瞞病事聽受七日法出界去七日滿即當還若夏安居訖不得不去謂檀越請安居供養限至安居竟應出行乃至一宿若波留若病若不限請及非受請處安居不去無犯一百四十不得邊界有疑恐怖處人間遊行邊界者遠城邑處若被喚請等若先至彼有疑恐怖事起不犯不得於界內有疑恐怖處人間遊行界內者遶城四面不得親近居士居士兒共住作不隨順行諫而不捨親近者數數共語共笑共調戲不得往觀王宮文飾畵堂園林浴池不得露身在河泉池水中浴若作浴衣應長佛六磔手廣二磔手半不得過浴衣者障身洗浴之衣佛一磔手當常人三磔手約周尺有一尺八寸不得縫衣過五日若無刀針線及衣少不足乃至難事者不犯不得過五日不看衣餘一切所須之物亦應五日一看無令失去蟲爛色壞若舉處堅牢若受寄人為看俱不犯不得與眾僧衣作留難謂檀越欲施僧衣而勸令施食不施衣也亦不應與餘人及餘物作留難若不問主不得便著他衣除是親厚者一百五十不得持沙門衣施與外道白衣白衣者在家人也除與父母及與償債若他人來索袈裟片以禳災者應使淨人與若眾僧如法分衣不得遮令不分恐弟子不得故式叉摩那無畜徒法然亦不得為親厚知識遮也不得作是意令眾僧今不得出功德衣後當出欲令五事久得放捨故僧尼二眾安居竟十六日俱受功德衣受此衣已於五月中得五事利益一得畜長衣二得離衣宿三得別眾食四得展轉食五得食前食後不囑授入聚落式叉摩那雖無功德衣以隨大尼安居故亦應得其五利功德此衣至十二月十五日眾僧共羯磨捨不得作是意遮比丘尼僧不出功德衣欲令久得五事放捨故若餘尼語言為我滅此諍事即當與作方便令滅若病若言他不信用若彼破戒等不犯不得自手持食與白衣及外道食當使人與若置於物上與不得為白衣作使謂料理白衣家業或舂磨煮食敷坐取水掃地等若為父母及信心優婆夷病或被繫閉人不犯不得自手紡縷若自索線合接線不犯若入白衣舍內不得在小牀大牀上坐臥若至白衣舍宿明日當辭主人而去若囑授親厚人知若有賊人毒蛇惡獸出去皆不犯一百六十不得誦習世俗呪術或教人誦習若知如是人不得度令出家如是人者婬女也若其有大信心厭離惡法應將至五六由旬付與大尼教授深藏安處之式叉摩那雖無畜徒法然須預學不得不二歲隨和尚尼受大戒已仍須二歲隨師若師破戒去不犯若比丘尼僧夏安居竟應往比丘僧中說見聞疑三事自恣不得不往應預學之按根本部學法女亦隨尼眾往大僧處自恣不得在無比丘處夏安居以不得教授及有疑無可諮問處若知有比丘僧伽藍當白已然後入梵語僧伽藍此云眾園謂眾僧所住之處也應先白已而入不得罵比丘不得喜鬬諍不善憶持諍事後瞋恚不喜便罵尼眾若身生癰及種種瘡不白眾及餘人不得輙使男子破或裹欲使男子醫治者應打健椎集尼眾來在病人前以衣裹身惟留可應治處令治之若先受請足食已後不得更食正食正食者謂飯乾飯等若受非正食請若不滿足食請若先不被請皆不犯一百七十不得於家生嫉姤心謂知識檀越家以物施與餘人而自心不喜便生嫉姤也不得以香塗摩身不得以胡麻滓塗摩身胡麻即芝麻不得使他塗摩身不得使式叉尼沙彌尼在家婦女塗摩身亦不得使比丘尼揩摩身不得著貯跨衣跨衣者即褲類貯者或以綿若毳而絮也不得畜婦女莊嚴身具謂手足釧指環瓔珞等不得著革屣持葢行革屣者皮履也葢傘葢也若天雨時聽在寺內持葢及聽在寺內著屧若無病不得乘乘行乘者謂象馬車步乘也若老若病聽乘步挽乘及女乘若有難聽乘乘去若不著僧祇支不得入村僧祇支者掩腋衣也不著即露胸乳腰也若無若失若方欲作不犯不得向暮至白衣家若為三寶事瞻病事若檀越喚聽去一百八十不得向暮開寺門不囑授餘尼而出若無事應前安居有事應後安居不得不安居四月十六日是前安居日五月十六日是後安居日若有三寶事若瞻病事不及前安居聽後安居前安居住至七月十五日解後安居住至八月十五日解不得學世俗伎術以自活命不得以世俗伎術教授白衣謂不得教在家人莫向日月神祀廟舍大小便莫向日月神祀除去糞掃及蕩器諸不淨水莫向日月神祀舒脚又言今日某星宿日好宜種作造舍納使與小兒剃頭長髮宜舉財物宜遠行等若被𢷤不得不去應隨順下意懺悔求解擯若欲問比丘經義應先求聽許已而後問若先常聽問若是二師親厚知識不求不犯若知先住後至後至先住不得欲惱彼故在前經行若立若坐若臥若知有比丘寺院不得於寺內起塔謂起尼塔也若故壞寺若先起塔後作寺俱不犯若見新受戒比丘應起迎逆恭敬禮拜問訊請與坐若是一坐食若有病當言大德懺悔我有如是因緣不得起迎逆不得為好故搖身趨行一百九十不得作婦女莊嚴香塗摩身不得使外道女香塗摩身不得無病乞酥油蜜石蜜乳酪魚肉食已上一百九十三法屬戒向下九十九法屬威儀當齊整著裙當齊整著衣不得反抄衣入俗舍不得反抄衣入俗舍坐不得衣纏頸入俗舍不得衣纏頸入俗舍坐不得覆頭入俗舍二百不得覆頭入俗舍坐不得跳行入俗舍不得跳行入俗舍坐不得俗舍內蹲坐不得叉腰行入俗舍不得手叉腰入俗舍坐不得搖身行入俗舍不得搖身行入俗舍坐不得掉臂行入俗舍不得掉臂行入俗舍坐二百一十當好覆身入俗舍當好覆身入俗舍坐不得左右顧視行入俗舍不得左右顧視入俗舍坐當靜默入俗舍當靜默入俗舍坐不得戲笑行入俗舍不得戲笑入俗舍坐當用意受食當平鉢受食二百二十當平鉢受羮當羮飯等食當以次食不得挑鉢中央而食無病不得為己索羮飯不得以飯覆羮更望得不得視比座鉢中當繫鉢想食不得大摶飯食不得大張口待飯食二百三十不得含飯語餘物亦不聽不得摶飯遙擲口中不得遺落飯食不得頰食食不得嚼飯作聲食不得大噏飯食噏同吸不得舌䑛食不得振手食謂舉手奮之也若食中有蟲草等振去不犯不得手把散飯食不得污手捉食器二百四十不得洗鉢水棄俗舍當持出外棄之不得水中大小便涕唾除病不犯不得立大小便除病不得與反抄衣不恭敬人說法除病不得為衣纏頸者說法除病不得為覆頭者說法除病不得為裹頭者說法除病不得為叉腰者說法除病不得為著革屣者說法除病不得為著木屐者說法除病二百五十不得為騎乘者說法除病不得在佛塔中止宿除為守護故不得藏財物置佛塔中除為堅牢故不得著革屣入佛塔中不得手捉革屣入佛塔中不得著屣繞佛塔行不得著富羅入佛塔中富羅是短脛靴佛聽寒雪國著之不得捉富羅入佛塔中不得塔下坐食留草及食污地不得擔死屍從塔下過二百六十不得塔下埋死屍不得在塔下燒死屍不得向塔下燒死屍不得佛塔四邊燒死屍使臭氣來入不得持死人衣及牀從塔下過除浣染香熏已不得佛塔下大小便不得向佛塔大小便不得繞塔四邊大小便使臭氣來入不得持佛像至大小便處不得在佛塔下嚼楊枝二百七十不得向佛塔嚼楊枝不得佛塔四邊嚼楊枝不得在佛塔下涕唾不得向佛塔涕唾不得塔四邊涕唾不得向塔舒脚坐不得安佛塔在下房己在上房住人坐己立不得為說法除病人臥己坐不得為說人在座己在非座不得為說法除病二百八十人在高座己在下座不得為說法除病人在前行己在後行不得為說法除病人在高經行處己在下經行處不應為說法除病人在道己在非道不應為說法除病不得携手在道行不得上樹過人高除難因緣不得絡囊盛鉢貫杖頭著肩上而行人持杖不恭敬不應為說法除病人持劒不應為說法除病人持鉾不應為說法除病人持刀不應為說法除病人持葢不應為說法除病二百九十法竟僧祇律云式叉摩那在一切大尼下在一切沙彌尼上至布薩自恣日入僧中胡跪合掌作是言阿梨耶僧我某甲清淨願僧憶念持三說而去阿梨耶此言聖者懺二百九十二行法法式叉摩那若違行法直犯佛教即須懺悔不壞本所學六法當於和尚尼此云親教師前若阿闍梨此云軌範師前若餘比丘尼前偏袒右肩胡跪合掌作如是言親教師一心念我某甲式叉摩那故以染污心受染污心男子捉手餘二百九十一法中有犯隨所犯事稱之犯行法今向親教師發露懺悔更不敢作願師憶我三說彼尼答言自責汝心應生厭離自答言爾若非二師應稱大姊或阿姨音釋溉音既㲲音牒牕牖上音瘡下音有苫閃字入聲閾音域磔音窄屧音燮四分律刪補隨機羯磨疏八卷唐道宣撰會入于四分律刪補隨機羯磨疏濟緣記
